<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Podcast Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d0d1a;
      --surface: #161627;
      --surface2: #1e1e35;
      --border: rgba(255, 255, 255, 0.07);
      --accent: #7c6df8;
      --accent2: #a78bfa;
      --text-primary: #f0f0ff;
      --text-secondary: #9090b8;
      --text-muted: #5a5a85;
      --radius: 14px;
      --radius-sm: 8px;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text-primary);
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    .card {
      width: 100%;
      max-width: 580px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 0 40px rgba(124, 109, 248, 0.12);
    }

    /* ---- Header row ---- */
    .header {
      display: flex;
      gap: 14px;
      padding: 14px 14px 12px;
      position: relative;
    }

    .cover-wrap {
      flex-shrink: 0;
      width: 76px;
      height: 76px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #cover-art {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .cover-fallback {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #2d1f6e 0%, #1a1040 100%);
    }

    .cover-fallback svg {
      width: 36px;
      height: 36px;
      opacity: 0.6;
    }

    .meta {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
    }

    #podcast-title {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #episode-title {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.3;
      color: var(--text-primary);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .link-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      color: var(--text-muted);
      opacity: 0.7;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s, opacity 0.2s;
      text-decoration: none;
    }

    .link-btn:hover {
      color: var(--accent2);
      opacity: 1;
    }

    /* ---- Description ---- */
    .description-wrap {
      margin: 0 14px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      max-height: 80px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--text-muted) transparent;
    }

    .description-wrap::-webkit-scrollbar {
      width: 4px;
    }

    .description-wrap::-webkit-scrollbar-thumb {
      background: var(--text-muted);
      border-radius: 2px;
    }

    #description {
      font-size: 12px;
      line-height: 1.6;
      color: var(--text-secondary);
    }

    /* ---- Audio controls ---- */
    .controls {
      padding: 10px 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .progress-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .time {
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      color: var(--text-muted);
      white-space: nowrap;
      min-width: 35px;
    }

    .progress-wrap {
      flex: 1;
      position: relative;
      height: 20px;
      display: flex;
      align-items: center;
      cursor: pointer;
    }

    #progress-bar {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: var(--surface2);
      outline: none;
      cursor: pointer;
    }

    #progress-bar::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px rgba(124, 109, 248, 0.6);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    #progress-bar:active::-webkit-slider-thumb {
      transform: scale(1.3);
      box-shadow: 0 0 14px rgba(124, 109, 248, 0.9);
    }

    #progress-bar::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
    }

    .controls-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    .skip-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 6px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s, background 0.2s;
    }

    .skip-btn:hover {
      color: var(--text-primary);
      background: var(--surface2);
    }

    #play-pause-button {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent) 0%, #5b4de0 100%);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(124, 109, 248, 0.4);
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
      flex-shrink: 0;
    }

    #play-pause-button:hover:not(:disabled) {
      transform: scale(1.07);
      box-shadow: 0 6px 28px rgba(124, 109, 248, 0.55);
    }

    #play-pause-button:active:not(:disabled) {
      transform: scale(0.95);
    }

    #play-pause-button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #play-pause-button svg {
      color: #fff;
    }

    #pause-icon {
      display: none;
    }

    /* ---- Loading state ---- */
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      border-radius: var(--radius);
      transition: opacity 0.3s;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid var(--surface2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .card-wrap {
      position: relative;
    }
  </style>
</head>

<body>
  <div class="card-wrap">
    <div class="card" id="player-card">

      <!-- Header -->
      <div class="header">
        <div class="cover-wrap">
          <img id="cover-art" alt="Cover art" />
          <div class="cover-fallback" id="cover-art-fallback">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
              stroke-linejoin="round">
              <circle cx="12" cy="12" r="4" />
              <path
                d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
            </svg>
          </div>
        </div>
        <div class="meta">
          <div id="podcast-title">Loading…</div>
          <div id="episode-title">Podcast Episode</div>
        </div>
        <a id="link-btn" class="link-btn" href="#" target="_blank" title="Open episode" aria-label="Open episode link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
            <polyline points="15 3 21 3 21 9" />
            <line x1="10" y1="14" x2="21" y2="3" />
          </svg>
        </a>
      </div>

      <!-- Description -->
      <div class="description-wrap">
        <div id="description">Loading episode information…</div>
      </div>

      <!-- Controls -->
      <div class="controls">
        <div class="progress-row">
          <span class="time" id="current-time">0:00</span>
          <div class="progress-wrap">
            <input type="range" id="progress-bar" min="0" value="0" step="1" />
          </div>
          <span class="time" id="duration">0:00</span>
        </div>
        <div class="controls-row">
          <button class="skip-btn" id="skip-back-btn" title="Back 15s" aria-label="Skip back 15 seconds">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <polyline points="1 4 1 10 7 10" />
              <path d="M3.51 15a9 9 0 1 0 .49-3.97" />
              <text x="7.5" y="15.5" font-size="6" fill="currentColor" stroke="none" font-family="Inter,sans-serif"
                font-weight="700">15</text>
            </svg>
          </button>
          <button id="play-pause-button" disabled aria-label="Play">
            <svg id="play-icon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <polygon points="5 3 19 12 5 21 5 3" />
            </svg>
            <svg id="pause-icon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <rect x="6" y="4" width="4" height="16" />
              <rect x="14" y="4" width="4" height="16" />
            </svg>
          </button>
          <button class="skip-btn" id="skip-fwd-btn" title="Forward 30s" aria-label="Skip forward 30 seconds">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10" />
              <path d="M20.49 15a9 9 0 1 1-.49-3.97" />
              <text x="7.5" y="15.5" font-size="6" fill="currentColor" stroke="none" font-family="Inter,sans-serif"
                font-weight="700">30</text>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Loading overlay -->
    <div class="loading-overlay" id="loading-overlay">
      <div class="spinner"></div>
    </div>
  </div>

  <audio id="podcast-audio" preload="none"></audio>
  <script src="./splash.js"></script>
</body>

</html>
