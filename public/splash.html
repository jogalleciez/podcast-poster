<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="stylesheet" type="text/css" href="splash.css" />
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, width=device-width, height=device-height, user-scalable=0" />
  <title>Podcast Player</title>
</head>

<body class="app">
  <!-- Hidden Audio Element setup with a placeholder podcast -->
  <audio id="podcast-audio"
    src="https://traffic.omny.fm/d/clips/aaea4e69-af51-495e-afc5-a9760146922b/43e74c84-cf95-46fa-a83d-acb8002f2ab5/59cfd22f-e89c-4db3-bb39-afeb01633cf4/audio.mp3">
  </audio>

  <div class="player-card">
    <div class="cover-art-placeholder">
      <img id="cover-art" style="display: none; width: 100%; height: 100%; object-fit: cover; border-radius: 20px;" />
      <svg id="cover-art-fallback" xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        class="feather feather-music">
        <path d="M9 18V5l12-2v13"></path>
        <circle cx="6" cy="18" r="3"></circle>
        <circle cx="18" cy="16" r="3"></circle>
      </svg>
    </div>

    <div class="player-right-panel">
      <div class="content">
        <h1 class="title" id="title">Loading...</h1>
        <p class="description" id="subtitle">Please wait</p>
      </div>

      <div class="controls-container">
        <button class="play-button" id="play-pause-button" disabled>
          <svg id="play-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
            fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            class="feather feather-play">
            <polygon points="5 3 19 12 5 21 5 3"></polygon>
          </svg>
          <svg id="pause-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
            fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            class="feather feather-pause" style="display: none;">
            <rect x="6" y="4" width="4" height="16"></rect>
            <rect x="14" y="4" width="4" height="16"></rect>
          </svg>
        </button>

        <div class="progress-wrapper">
          <input type="range" id="progress-bar" value="0" step="0.1" min="0" max="100" />
          <div class="time-display">
            <span id="current-time">0:00</span>
            <span id="duration">0:00</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="splash.js" defer></script>
</body>

</html>
